{% extends 'tax_extractor/base.html' %}

{% block title %}Error{% endblock %}

{% block content %}
<div class="bg-white rounded-xl shadow-lg p-8 text-center">
  <div class="text-6xl mb-4">⚠️</div>
  <h1 class="text-3xl font-bold text-red-500 mb-2">Processing Failed</h1>
  <p class="text-gray-600 mb-8">
    An error occurred while processing your document
  </p>

  <div class="bg-red-50 border-l-4 border-red-500 p-6 mb-8 text-left flex items-start gap-3">
    <span class="text-xl">❌</span>
    <div>
      <strong class="text-red-800">Error Details:</strong>
      <p class="mt-2 font-mono text-sm text-red-700">{{ error }}</p>
    </div>
  </div>

  <div class="flex gap-4 justify-center">
    <a href="{% url 'document_list' %}" class="inline-flex items-center gap-2 px-6 py-3 bg-white text-blue-600 border-2 border-blue-600 font-semibold rounded-lg hover:bg-blue-50 transition-all no-underline">
      <span>←</span>
      <span>Back to Documents</span>
    </a>
    <a href="{% url 'upload_document' %}" class="inline-flex items-center gap-2 px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 hover:-translate-y-0.5 hover:shadow-lg hover:shadow-blue-600/30 transition-all no-underline">
      <span>↻</span>
      <span>Try Again</span>
    </a>
  </div>
</div>
{% endblock %}
