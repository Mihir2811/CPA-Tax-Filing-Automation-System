{% extends 'tax_extractor/base.html' %} {% block content %}
<div class="bg-white rounded-xl shadow-lg p-8 max-w-md mx-auto mt-16">
  <div class="text-center mb-6">
    <div class="text-5xl mb-4">🔐</div>
    <h1 class="text-3xl font-bold text-gray-800 mb-2">Login</h1>
    <p class="text-gray-600">Sign in to access your tax documents</p>
  </div>

  <form method="post">
    {% csrf_token %}
    <div class="mb-6">
      <label class="block mb-2 font-semibold text-gray-800">Username</label>
      <input type="text" name="username" class="w-full px-3 py-3 border-2 border-gray-200 rounded-lg text-base focus:outline-none focus:border-blue-600 focus:ring-3 focus:ring-blue-100 transition-all" required />
    </div>
    <div class="mb-6">
      <label class="block mb-2 font-semibold text-gray-800">Password</label>
      <input type="password" name="password" class="w-full px-3 py-3 border-2 border-gray-200 rounded-lg text-base focus:outline-none focus:border-blue-600 focus:ring-3 focus:ring-blue-100 transition-all" required />
    </div>
    <button type="submit" class="w-full inline-flex items-center justify-center gap-2 px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 hover:-translate-y-0.5 hover:shadow-lg hover:shadow-blue-600/30 transition-all">
      Login
    </button>
  </form>
</div>
{% endblock %}
